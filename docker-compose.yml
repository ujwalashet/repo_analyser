version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: repo_analysis_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: repo_analysis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: repo_analysis_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  chromadb:
    image: chromadb/chroma:latest
    container_name: repo_analysis_chromadb
    restart: always
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: repo_analysis_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=db
      - REDIS_HOST=redis
      - CHROMA_HOST=chromadb
    env_file:
      - ./backend/.env
    volumes:
      - repo_data:/app/data/repos
    depends_on:
      - db
      - redis
      - chromadb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: repo_analysis_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  repo_data:
